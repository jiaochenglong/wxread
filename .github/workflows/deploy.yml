name: wxread

on:
  schedule:
    - cron: '47 15 * * *'  # 北京时间 23:47（UTC 时间 15:47）
    - cron: '47 8 * * *'   # 北京时间 16:47（UTC 时间 08:47）
  workflow_dispatch:       # 支持手动触发测试

jobs:
  deploy:
    runs-on: ubuntu-22.04
    # 如果你没在 Settings -> Environments 里创建 AutoRead，请删除下面这一行
    environment: AutoRead  

    steps:
    - name: Set DNS to Google's DNS
      run: |
        echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
        echo "nameserver 8.8.4.4" | sudo tee -a /etc/resolv.conf

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install certifi==2024.8.30 charset-normalizer==3.4.0 idna==3.10 requests==2.32.3 urllib3==2.2.3

    - name: Random delay
      # 仅在定时触发时延迟，手动触发时不延迟以便快速看到效果
      if: github.event_name != 'workflow_dispatch'
      run: |
        DELAY=$((RANDOM % 11)) 
        echo "Scheduled task: Delaying for $DELAY minutes..."
        sleep $((DELAY * 60))

    - name: Generate READ_NUM
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          # 【手动触发测试用】设置为 2 次（约 1 分钟），确保能快速走完流程并触发推送
          RANDOM_NUM=2
          echo "Manual trigger: Running quick test (1 min)."
        elif [[ "${{ github.event.schedule }}" == "47 15 * * *" ]]; then
          # 23:47 任务：约 290-350 分钟
          RANDOM_NUM=$((RANDOM % 121 + 580))
        else
          # 16:47 任务：约 120-180 分钟
          RANDOM_NUM=$((RANDOM % 121 + 240))
        fi
        echo "READ_NUM=$RANDOM_NUM" >> $GITHUB_ENV
        echo "Target duration: $((RANDOM_NUM * 30 / 60)) minutes."

    - name: Run deployment script
      env:
        # 以下变量请确保已在 GitHub Secrets 中正确配置
        WXREAD_CURL_BASH: ${{ secrets.WXREAD_CURL_BASH }}
        PUSH_METHOD: 'telegram' # 强制指定为 telegram 进行测试，或使用 ${{ secrets.PUSH_METHOD }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        READ_NUM: ${{ env.READ_NUM }}
      run: |
        python main.py
