name: wxread

# 提前启用 Node.js 24 环境，彻底消除 GitHub 的弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }} # 使用工作流名称作为并发组的key
  cancel-in-progress: true    # 取消任何正在进行的相同并发组的工作流

on:
  schedule:
    # 晚间任务：北京时间每天 23:47（UTC 时间 15:47）
    - cron: '47 15 * * *'  
    # 下午任务：北京时间每天 16:47（UTC 时间 08:47）
    - cron: '47 8 * * *'   
  workflow_dispatch:  # 手动触发

jobs:
  deploy:
    runs-on: ubuntu-22.04
    environment: AutoRead  # 指定环境

    steps:

    - name: Set DNS to Google's DNS
      run: |
        echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
        echo "nameserver 8.8.4.4" | sudo tee -a /etc/resolv.conf

    - name: Checkout repository
      uses: actions/checkout@v4 # 💡 升级到 v4，支持更高版本的 Node 环境

    - name: Set up Python
      uses: actions/setup-python@v5 # 💡 升级到 v5，全面兼容新版环境
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install certifi==2024.8.30 charset-normalizer==3.4.0 idna==3.10 requests==2.32.3 urllib3==2.2.3

    - name: Random delay
      # 如果是手动触发 (workflow_dispatch)，则直接跳过此步骤，实现“直接启动、0延迟”
      if: github.event_name != 'workflow_dispatch'
      run: |
        DELAY=$((RANDOM % 11)) 
        echo "Scheduled task: Delaying for $DELAY minutes..."
        sleep $((DELAY * 60))

    - name: Generate READ_NUM
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          # 手动触发测试用：强制设置为 2 次（对应脚本运行时间约为 1 分钟），快速结束并测试推送
          RANDOM_NUM=2
          echo "Manual trigger: Running quick test (1 min)."
        elif [[ "${{ github.event.schedule }}" == "47 15 * * *" ]]; then
          # 定时任务 23:47：约 290-350 分钟
          RANDOM_NUM=$((RANDOM % 121 + 580))
        else
          # 定时任务 16:47：约 120-180 分钟
          RANDOM_NUM=$((RANDOM % 121 + 240))
        fi
        echo "READ_NUM=$RANDOM_NUM" >> $GITHUB_ENV
        echo "Target duration: $((RANDOM_NUM * 30 / 60)) minutes."

    - name: Run deployment script
      env:
        WXREAD_CURL_BASH: ${{ secrets.WXREAD_CURL_BASH }}
        PUSH_METHOD: ${{ secrets.PUSH_METHOD }}
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        WXPUSHER_SPT: ${{ secrets.WXPUSHER_SPT }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SERVERCHAN_SPT:  ${{ secrets.SERVERCHAN_SPT }}
        READ_NUM: ${{ env.READ_NUM }}  # 动态读取上一步生成的次数

      run: |
        python main.py

  keepalive-job:
    name: Keepalive Workflow
    if: ${{ always() }}
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1.2.1
